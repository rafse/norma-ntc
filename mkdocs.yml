site_name: norma-ntc
site_description: Python library for structural verification according to NTC 2018
site_author: Raffaele Sestito
site_url: https://rafse.github.io/norma-ntc/

repo_name: rafse/norma-ntc
repo_url: https://github.com/rafse/norma-ntc

theme:
  name: material
  language: it
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Passa alla modalità scura
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Passa alla modalità chiara
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.highlight
    - content.code.copy

plugins:
  - search:
      lang: it
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            docstring_style: google
            show_source: true
            show_root_heading: true

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - pymdownx.details
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Azioni (Cap. 2-5):
    - Carichi: actions/loads.md
    - Vento: actions/wind.md
    - Neve: actions/snow.md
    - Sismica: actions/seismic.md
    - Temperatura: actions/temperature.md
    - Incendio: actions/fire.md
    - Combinazioni: actions/combinations.md
    - Ponti: actions/bridges.md
  - Verifiche (Cap. 4-8):
    - Cemento armato: checks/concrete.md
    - Acciaio: checks/steel.md
    - Composito: checks/composite.md
    - Legno: checks/timber.md
    - Muratura: checks/masonry.md
    - Geotecnica: checks/geotechnical.md
    - Progettazione sismica: checks/seismic_design.md
    - Edifici esistenti: checks/existing_buildings.md
  - Esempi:
    - Calcolo carichi e combinazioni: examples/carichi_combinazioni.md
  - Tracciabilità normativa: traceability.md
